<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <ul>
        <li>1</li>
           <li>2</li>
              <li>3</li>
                 <li>4</li>
                    <li>5</li>

                          <li>7</li>
                          
    </ul>

<script>
  const items = document.querySelectorAll('li');
  const ul = document.querySelector('ul');

  const sevenElement = items[5];

  const sixElement = document.createElement('li');
  sixElement.innerHTML = '6';

  ul.insertBefore(sixElement, sevenElement);

</script>
</body>
</html>
