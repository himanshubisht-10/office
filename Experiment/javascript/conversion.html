<!doctype html>
<html>
  <head>
    <title>A/B Test</title>
  </head>
  <body>
    <h2>A/B testing</h2>
    <button id="mybutton">click me</button>
    <p id="result"></p>

    <button id="mydashboard">showstatus</button>
    <div id="dashboard"></div>

    <script>
      const button = document.getElementById("mybutton");
      const content = document.getElementById("result");
      const statsBtn = document.getElementById("mydashboard");
      const text = document.getElementById("dashboard");

      function getVariant() {
        let num = Math.random();
        if (num < 0.5) {
          return "A";
        } else {
          return "B";
        }
      }

      let stats;
      let savedStats = localStorage.getItem("stats");

      if (savedStats) {
        stats = JSON.parse(savedStats);
      } else {
        stats = { A: { views: 0, clicks: 0 }, B: { views: 0, clicks: 0 } };
      }

      function trackClick(variant) {
        stats[variant].clicks++;
        localStorage.setItem("stats", JSON.stringify(stats));
      }

      let variant;
      let savedVariant = localStorage.getItem("variant");

      if (savedVariant) {
        variant = savedVariant;
      } else {
        variant = getVariant();
        localStorage.setItem("variant", variant);
      }

      stats[variant].views++;
      localStorage.setItem("stats", JSON.stringify(stats));

      if (variant === "A") {
        button.style.background = "blue";
      } else {
        button.style.background = "green";
      }

      button.addEventListener("click", function () {
        trackClick(variant);
        content.innerHTML =
          "You clicked variant: " +
          variant +
          " (Total clicks: " +
          stats[variant].clicks +
          ")";
      });

      // --- Dashboard part ---
      function getConversionRate(v) {
        let data = stats[v];
        return (data.clicks / data.views) * 100;
      }

      statsBtn.addEventListener("click", function () {
        if (stats.A.views === 0 || stats.B.views === 0) {
          text.innerHTML =
            "Not enough data yet — refresh in incognito or wait for more views!";
          return; 
        }

        // Agar dono ke paas data hai, tabhi ye neeche wala chalega

        let rateA = getConversionRate("A");
        let rateB = getConversionRate("B");

        let winner = "It's a tie";
        if (rateA > rateB) winner = "A is winning";
        else if (rateB > rateA) winner = "B is winning";

        text.innerHTML =
          "A: " +
          stats.A.views +
          " views, " +
          stats.A.clicks +
          " clicks, " +
          rateA.toFixed(1) +
          "% conversion<br>" +
          "B: " +
          stats.B.views +
          " views, " +
          stats.B.clicks +
          " clicks, " +
          rateB.toFixed(1) +
          "% conversion<br>" +
          "<strong>" +
          winner +
          "</strong>";
      });
    </script>
  </body>
</html>
